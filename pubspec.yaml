name: kliensy
description: Simple but scalable Flutter client for Spring Smart Wallet auth.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.17
  http: ^1.6.0
  shared_preferences: ^2.5.5
  go_router: ^14.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/auth/auth_background.jpg
    - assets/images/auth/auth_right.svg

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0